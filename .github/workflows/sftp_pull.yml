name: Pull from SFTP

on:
  schedule:
    - cron: "0 * * * *"  # Every hour
  workflow_dispatch:      # Also allows manual run

jobs:
  sftp_download:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python 3.10.18
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.18'

      - name: Install dependencies
        run: pip install paramiko
        
        name: Configure DNS
        run: echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

      - name: Test DNS resolution
        run: nslookup $SFTP_HOST

      - name: Download from SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
        run: python download.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto: Pull files from SFTP"
          git push
